spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  sql:
    init:
      mode: never

app:
  jwt:
    secret: change-this-before-production-change-this-before-production
    expiration-ms: 86400000
  stripe:
    secret-key: change-this-before-production
    webhook-secret: change-this-before-production
