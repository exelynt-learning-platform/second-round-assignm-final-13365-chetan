spring:
  application:
    name: ecommerce-backend
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/multigenesys?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-this-before-production-change-this-before-production}
    expiration-ms: 86400000
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:change-this-before-production}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:change-this-before-production}
